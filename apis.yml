apis:
  - aid: tock:partner-api
    name: Tock Partner API
    description: >-
      Contractual REST API offered to approved POS, CRM, marketing,
      loyalty, ticketing, and accounting partners. The Partner API
      exposes reservations, ticketed experiences, takeout/delivery
      orders, guest profiles, and venue configuration; access is
      granted by Tock's partnerships team under a written agreement.
      Tock does not publish a self-serve developer portal, OpenAPI
      definition, or public SDK; documentation and credentials are
      provided to approved partners directly.
    humanURL: https://www.exploretock.com/partners
